<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Votación Electrónica</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>🗳 Sistema de Votación Electrónica</h1>

<div class="card">

<input id="votante" placeholder="Nombre del votante">

<select id="opcion">
<option value="">Seleccionar opción</option>
<option>A</option>
<option>B</option>
<option>C</option>

</select>

<button onclick="votar()">
Votar
</button>

</div>

<div class="card">

<h2>Resultados</h2>

<div id="resultados"></div>

<button onclick="exportarJSON()">
Exportar Datos
</button>

<button onclick="reiniciar()">
Reiniciar
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
